<div class="task-table">
  <h2>Completed Tasks</h2>

  <table>
    <thead>
      <tr>
        <th>Title</th>
        <th>Priority</th>
        <th>Due Date</th>
      </tr>
    </thead>

    <tbody>
      <ng-container *ngFor="let task of (completedTasks$ | async)">
        <tr>
          <td>{{ task.title }}</td>
          <td>
            <app-badge
              [text]="task.priority"
              [variant]="getPriorityVariant(task.priority)"
            ></app-badge>
          </td>
          <td>{{ task.dueDate }}</td>
        </tr>
      </ng-container>
    </tbody>
  </table>
</div>

<div class="dashboard-page">
  <div class="dashboard-header">
    <div>
      <p class="eyebrow">Workspace overview</p>
      <h1>Task Management Dashboard</h1>
    </div>

    <app-button
      label="+ Add New Task"
      variant="primary"
      (buttonClick)="toggleForm()"
    ></app-button>
  </div>

  <div class="filter-bar">
    <input
      type="text"
      placeholder="Search by task title"
      [(ngModel)]="searchText"
    />

    <select [(ngModel)]="statusFilter">
      <option value="All">All Status</option>
      <option value="Pending">Pending</option>
      <option value="In Progress">In Progress</option>
      <option value="Completed">Completed</option>
    </select>

    <select [(ngModel)]="priorityFilter">
      <option value="All">All Priority</option>
      <option value="High">High</option>
      <option value="Medium">Medium</option>
      <option value="Low">Low</option>
    </select>
  </div>

  <div class="stats-grid">
    <app-card>
      <div class="stat-card-content">
        <p>Total Tasks</p>
        <h2>{{ totalTasks }}</h2>
      </div>
    </app-card>

    <app-card variant="active">
      <div class="stat-card-content">
        <p>Active Tasks</p>
        <h2>{{ totalItems }}</h2>
      </div>
    </app-card>

    <app-card variant="progress">
      <div class="stat-card-content">
        <p>In Progress</p>
        <h2>{{ inProgressTasks }}</h2>
      </div>
    </app-card>

    <app-card variant="completed">
      <div class="stat-card-content">
        <p>Completed</p>
        <h2>{{ completedTasks }}</h2>
      </div>
    </app-card>

    <app-card variant="pending">
      <div class="stat-card-content">
        <p>Pending</p>
        <h2>{{ pendingTasks }}</h2>
      </div>
    </app-card>
  </div>

  <app-modal
    [isOpen]="showForm"
    [title]="editingTaskId !== null ? 'Edit Task' : 'Add New Task'"
    (close)="toggleForm()"
  >
    <div class="form-grid">
      <input
        type="text"
        placeholder="Task title"
        [(ngModel)]="newTask.title"
      />

      <input
        type="date"
        [(ngModel)]="newTask.dueDate"
      />

      <select [(ngModel)]="newTask.status">
        <option value="Pending">Pending</option>
        <option value="In Progress">In Progress</option>
        <option value="Completed">Completed</option>
      </select>

      <select [(ngModel)]="newTask.priority">
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
    </div>

    <div class="form-actions">
      <app-button
        [label]="
          savingTask
            ? (editingTaskId !== null ? 'Updating...' : 'Saving...')
            : (editingTaskId !== null ? 'Update Task' : 'Save Task')
        "
        variant="primary"
        [disabled]="savingTask"
        (buttonClick)="addOrUpdateTask()"
      ></app-button>
    </div>
  </app-modal>

  <app-card>
    <div class="table-card-content">
      <div class="table-header">
        <div>
          <p class="eyebrow">Task list</p>
          <h2>Active Tasks</h2>
        </div>
      </div>

      <app-table
        [columns]="tableColumns"
        [data]="filteredTasks"
        [actions]="tableActions"
        [loading]="isLoading"
        [hasLoaded]="hasLoaded"
        [errorMessage]="errorMessage"
        [emptyTitle]="'No tasks found'"
        [emptyMessage]="'Add a new task or adjust your filters.'"
        [disabledActionMap]="disabledActionMap"
        [dynamicLabelMap]="dynamicLabelMap"
        [pageSize]="4"
        (actionClick)="onTableAction($event)"
      ></app-table>
    </div>
  </app-card>
</div>

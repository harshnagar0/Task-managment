<div class="task-table">
  <h2>All Tasks</h2>

  <table>
    <thead>
      <tr>
        <th>Title</th>
        <th>Status</th>
        <th>Priority</th>
        <th>Due Date</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let task of (taskService.tasks$ | async)">
        <td>{{ task.title }}</td>

        <td>
          <app-badge
            [text]="task.status"
            [variant]="
              task.status === 'In Progress'
                ? 'progress'
                : task.status === 'Completed'
                ? 'completed'
                : 'pending'
            "
          ></app-badge>
        </td>

        <td>
          <app-badge
            [text]="task.priority"
            [variant]="
              task.priority === 'High'
                ? 'high'
                : task.priority === 'Medium'
                ? 'medium'
                : 'low'
            "
          ></app-badge>
        </td>

        <td>{{ task.dueDate }}</td>
      </tr>
    </tbody>
  </table>
</div>
